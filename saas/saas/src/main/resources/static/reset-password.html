<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Reservation Password Reset</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
</head>
<body>
<section class="auth-shell-page">
    <div class="auth-stage single-stage">
        <div class="auth-stage-copy">
            <p class="eyebrow">SaaS Reservation</p>
            <h1>새 비밀번호를 설정하세요</h1>
            <p class="hero-copy">메일로 받은 재설정 링크가 유효한지 확인한 뒤 새 비밀번호를 저장합니다.</p>
        </div>
        <section class="panel auth-panel auth-panel-standalone">
            <div class="panel-header">
                <h3>비밀번호 재설정</h3>
                <p>새 비밀번호를 입력하고 저장하면 기존 비밀번호는 즉시 사용할 수 없게 됩니다.</p>
            </div>
            <form id="resetPasswordForm" class="card-form">
                <label>
                    <span>새 비밀번호</span>
                    <div class="password-field">
                        <input id="resetPasswordNew" name="newPassword" type="password" placeholder="새 비밀번호를 입력하세요" required>
                        <button type="button" class="ghost-btn password-toggle" data-password-toggle>보기</button>
                    </div>
                </label>
                <label>
                    <span>새 비밀번호 확인</span>
                    <div class="password-field">
                        <input id="resetPasswordConfirm" name="confirmPassword" type="password" placeholder="비밀번호를 한 번 더 입력하세요" required>
                        <button type="button" class="ghost-btn password-toggle" data-password-toggle>보기</button>
                    </div>
                </label>
                <p id="resetPasswordFeedback" class="form-feedback" aria-live="polite"></p>
                <button id="resetPasswordSubmitBtn" type="submit">새 비밀번호 저장</button>
                <a class="text-link" href="/">로그인 화면으로 돌아가기</a>
            </form>
        </section>
    </div>
</section>
<script src="/reset-password.js"></script>
</body>
</html>
